build:
  dockerfile: ./deploy/whale-ci/Dockerfile.dev

run_tests_sqlite:
  image: build
  command:
    - bash -c "echo '127.0.0.1 example.com sub.example.com sub1.example.com sub2.example.com sub3.example.com sub4.example.com sub5.example.com otherexample.com' >> /etc/hosts"
    - saltcorn run-tests saltcorn-data
    - saltcorn run-tests server
  environment:
    SQLITE_FILEPATH: /tmp/testdb.sqlite
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096

run_tests_postgres_db:
  image: postgres
  service: true
  quiet: true
  ready-on: CREATE DATABASE
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: saltcorn_test
    POSTGRES_USER: postgres

run_tests_postgres:
  image: build
  depends: run_tests_postgres_db 
  delay: 1
  command:
    - bash -c "echo '127.0.0.1 example.com sub.example.com sub1.example.com sub2.example.com sub3.example.com sub4.example.com sub5.example.com otherexample.com' >> /etc/hosts"
    - psql -d saltcorn_test --command='create extension "uuid-ossp";'
    - saltcorn reset-schema -f   
    - saltcorn run-tests
  environment:
    PGHOST: run_tests_postgres_db
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096 --enable-source-maps --require /opt/saltcorn/deploy/whale-ci/trc-stack-hook.js

pytest_db:
  image: postgres:16
  service: true
  quiet: true
  ready-on: CREATE DATABASE
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: saltcorn_test
    POSTGRES_USER: postgres

pytest:
  image: build
  depends: pytest_db 
  command:
    - bash -c "echo '127.0.0.1 example.com sub.example.com sub1.example.com sub2.example.com sub3.example.com sub4.example.com sub5.example.com otherexample.com' >> /etc/hosts"
    - psql -d saltcorn_test --command='create extension "uuid-ossp";'
    - pytest
  environment:
    PGHOST: pytest_db
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096

playwright_db:
  image: postgres:16
  service: true
  disable: true
  quiet: true
  ready-on: CREATE DATABASE
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: saltcorn_test
    POSTGRES_USER: postgres


playwright:
  dockerfile: ./deploy/whale-ci/Dockerfile.e2e
  disable: true
  depends: 
    - build
    - playwright_db
  command:
    - bash -c "echo '127.0.0.1 example.com sub.example.com sub1.example.com sub2.example.com sub3.example.com sub4.example.com sub5.example.com otherexample.com' >> /etc/hosts"

    - psql -d saltcorn_test --command='create extension "uuid-ossp";'
    - deploy/playwright/run.sh
  environment:
    PGHOST: playwright_db
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    SALTCORN_JWT_SECRET: "2f75ade09981d68f366a4e577025440d10b735cc270fc2092077140f98a41dab331589c79364601150816d9a3c6f34abf881019e2097e21a24963c56b9135bbb"

