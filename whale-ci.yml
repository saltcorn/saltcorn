build:
  dockerfile: ./deploy/whale-ci/Dockerfile.dev

run_tests_sqlite:
  image: build
  command:
    - nice -n 15 saltcorn run-tests saltcorn-data
    - nice -n 15 saltcorn run-tests server
    - nice -n 15 saltcorn run-tests view-queries
  extra_hosts:
    - "example.com:127.0.0.1"
    - "sub.example.com:127.0.0.1"
    - "sub1.example.com:127.0.0.1"
    - "sub2.example.com:127.0.0.1"
    - "sub3.example.com:127.0.0.1"
    - "sub4.example.com:127.0.0.1"
    - "sub5.example.com:127.0.0.1"
    - "otherexample.com:127.0.0.1"
  environment:
    SQLITE_FILEPATH: /tmp/testdb.sqlite
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096
    SALTCORN_JWT_SECRET: "2f75ade09981d68f366a4e577025440d10b735cc270fc2092077140f98a41dab331589c79364601150816d9a3c6f34abf881019e2097e21a24963c56b9135bbb"
    # workaround for prepareQueryEnviroment()
    JSON_WEB_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbkBmb28uY29tIiwicm9sZV9pZCI6MSwiaXNzIjoic2FsdGNvcm5Ac2FsdGNvcm4iLCJhdWQiOiJzYWx0Y29ybi1tb2JpbGUtYXBwIiwiaWF0IjoxOTI0OTA1NjAwMDAwLCJleHAiOjE5MjQ5MDU2MDAwMDB9.eE370EdQr90y9woWDzeDzZgGVsUSlfAmtykeAJ_gJjA"
          

run_tests_postgres_db:
  image: postgres
  service: true
  quiet: true
  ready-on: CREATE DATABASE
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: saltcorn_test
    POSTGRES_USER: postgres

run_tests_postgres:
  image: build
  depends: run_tests_postgres_db 
  delay: 1
  command:
    - psql -d saltcorn_test --command='create extension "uuid-ossp";'
    - nice -n 15 saltcorn reset-schema -f   
    - nice -n 15 saltcorn run-tests
  extra_hosts:
    - "example.com:127.0.0.1"
    - "sub.example.com:127.0.0.1"
    - "sub1.example.com:127.0.0.1"
    - "sub2.example.com:127.0.0.1"
    - "sub3.example.com:127.0.0.1"
    - "sub4.example.com:127.0.0.1"
    - "sub5.example.com:127.0.0.1"
    - "otherexample.com:127.0.0.1"
  environment:
    PGHOST: run_tests_postgres_db
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096 --enable-source-maps --require /opt/saltcorn/deploy/whale-ci/trc-stack-hook.js

pytest_db:
  image: postgres:16
  service: true
  quiet: true
  ready-on: CREATE DATABASE
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: saltcorn_test
    POSTGRES_USER: postgres

pytest:
  image: build
  depends: pytest_db 
  command:
    - psql -d saltcorn_test --command='create extension "uuid-ossp";'
    - nice -n 15 pytest
  extra_hosts:
    - "example.com:127.0.0.1"
    - "sub.example.com:127.0.0.1"
    - "sub1.example.com:127.0.0.1"
    - "sub2.example.com:127.0.0.1"
    - "sub3.example.com:127.0.0.1"
    - "sub4.example.com:127.0.0.1"
    - "sub5.example.com:127.0.0.1"
    - "otherexample.com:127.0.0.1"
  environment:
    PGHOST: pytest_db
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096

