build:
  dockerfile: ./deploy/dock-ci/Dockerfile.dev

postgres:
  dockerfile: ./deploy/dock-ci/Dockerfile.postgres
  service: true  
  ports: 5432
  ready_on: server started
  

run_tests_sqlite:
  image: build
  disable: true
  command:
    - run-tests saltcorn-data
    - run-tests server
  environment:
    SQLITE_FILEPATH: /tmp/testdb.sqlite
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096


run_tests_postgres:
  image: build
  depends: postgres
  delay: 3
  command:
    - saltcorn reset-schema -f
    - saltcorn run-tests saltcorn-data
    - saltcorn run-tests server
  environment:
    PGHOST: postgres
    PGPORT: 5432
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096
