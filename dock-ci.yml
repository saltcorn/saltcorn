build:
  dockerfile: ./deploy/dock-ci/Dockerfile.dev

postgres:
  image: postgres:16
  service: true  
  ports: 5433
  ready_on: CREATE DATABASE
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: saltcorn_test
    POSTGRES_USER: postgres
    PGPORT: 5433

run_tests_sqlite:
  image: build
  disable: true
  command:
    - run-tests saltcorn-data
    - run-tests server
  environment:
    SQLITE_FILEPATH: /tmp/testdb.sqlite
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096


run_tests_postgres:
  image: build
  depends: postgres 
  command:
    - psql -d saltcorn_test --command='create extension "uuid-ossp";'
    - saltcorn reset-schema -f   
    - saltcorn run-tests saltcorn-data
  environment:
    PGHOST: postgres
    PGPORT: 5433
    PGUSER: postgres
    PGDATABASE: saltcorn_test
    PGPASSWORD: postgres
    CI: true
    SALTCORN_MULTI_TENANT: true
    SALTCORN_SESSION_SECRET: "rehjtyjrtjr"
    NODE_OPTIONS: --max-old-space-size=4096
